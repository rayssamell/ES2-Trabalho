<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produto - ES2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">Sistema Vendas</a>
        <div class="navbar-nav">
            <a class="nav-link" href="produto.html">Novo Produto</a>
            <a class="nav-link" href="pedido.html">Novo Pedido</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Cadastrar Produto</h5>
                </div>
                <div class="card-body">
                    <form id="formProduto">
                        <div class="mb-4 p-3 bg-light border rounded">
                            <label class="form-label fw-bold">Selecione a Categoria (Herança)</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipoProd" id="tipoEletronico" value="ELETRONICO" checked>
                                <label class="form-check-label" for="tipoEletronico">
                                    Produto Eletrônico
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipoProd" id="tipoPerecivel" value="PERECIVEL">
                                <label class="form-check-label" for="tipoPerecivel">
                                    Produto Perecível
                                </label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nome do Produto</label>
                            <input type="text" class="form-control" id="prodNome" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Preço (R$)</label>
                                <input type="number" class="form-control" id="prodPreco" step="0.01" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Estoque (Qtde)</label>
                                <input type="number" class="form-control" id="prodEstoque" required>
                            </div>
                        </div>

                        <div class="row" id="areaVoltagem">
                            <div class="col-md-12 mb-3">
                                <label class="form-label text-primary fw-bold">Voltagem</label>
                                <select class="form-select border-primary" id="prodVoltagem">
                                    <option value="Bivolt">Bivolt</option>
                                    <option value="110V">110V</option>
                                    <option value="220V">220V</option>
                                </select>
                            </div>
                        </div>

                        <div class="row" id="areaValidade" style="display: none;">
                            <div class="col-md-12 mb-3">
                                <label class="form-label text-success fw-bold">Data de Validade</label>
                                <input type="date" class="form-control border-success" id="prodValidade">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 mt-3">Cadastrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const radiosTipo = document.querySelectorAll('input[name="tipoProd"]');
    const areaVoltagem = document.getElementById('areaVoltagem');
    const areaValidade = document.getElementById('areaValidade');

    radiosTipo.forEach(radio => {
        radio.addEventListener('change', function() {
            if (this.value === 'ELETRONICO') {
                areaVoltagem.style.display = 'block';
                areaValidade.style.display = 'none';
            } else {
                areaVoltagem.style.display = 'none';
                areaValidade.style.display = 'block';
            }
        });
    });

    document.getElementById('formProduto').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const tipoSelecionado = document.querySelector('input[name="tipoProd"]:checked').value;

        const dadosParaEnviar = {
            tipo: tipoSelecionado, // Isso é essencial para o Service saber qual classe usar
            nome: document.getElementById('prodNome').value,
            preco: parseFloat(document.getElementById('prodPreco').value),
            estoque: parseInt(document.getElementById('prodEstoque').value),
            // Envia os campos específicos (o Gson ignora o que for null no Java)
            voltagem: document.getElementById('prodVoltagem')?.value,
            data_validade: document.getElementById('prodValidade')?.value
        };

        fetch('http://localhost:8080/cadastrarProduto', {
            method: 'POST',
            body: JSON.stringify(dadosParaEnviar)
        })
        .then(res => res.json())
        .then(data => alert(data.mensagem))
    });
</script>

</body>
</html>
